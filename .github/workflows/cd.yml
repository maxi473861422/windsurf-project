name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: cd apps/api && npm run build

      - name: Build Web
        run: cd apps/web && npm run build

      - name: Deploy API to ECS
        run: |
          # Build and push Docker image
          docker build -t gsd-atlas-api:${{ github.sha }} apps/api
          docker tag gsd-atlas-api:${{ github.sha }} ${{ secrets.AWS_ECR_URI }}/gsd-atlas-api:${{ github.sha }}
          docker push ${{ secrets.AWS_ECR_URI }}/gsd-atlas-api:${{ github.sha }}
          
          # Update ECS service
          aws ecs update-service --cluster gsd-atlas-staging --service api --force-new-deployment

      - name: Deploy Web to S3
        run: |
          aws s3 sync apps/web/.next s3://${{ secrets.STAGING_S3_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.STAGING_CLOUDFRONT_ID }} --paths "/*"

      - name: Run database migrations
        run: |
          cd packages/database
          npx prisma migrate deploy

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deploy to Staging completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run load tests
        run: |
          k6 run tests/load/api-load-test.js --env API_URL=https://staging-api.gsdatlas.com
        continue-on-error: true

      - name: Build API
        run: cd apps/api && npm run build

      - name: Build Web
        run: cd apps/web && npm run build

      - name: Deploy API to ECS
        run: |
          docker build -t gsd-atlas-api:${{ github.sha }} apps/api
          docker tag gsd-atlas-api:${{ github.sha }} ${{ secrets.AWS_ECR_URI }}/gsd-atlas-api:${{ github.sha }}
          docker tag gsd-atlas-api:${{ github.sha }} ${{ secrets.AWS_ECR_URI }}/gsd-atlas-api:latest
          docker push ${{ secrets.AWS_ECR_URI }}/gsd-atlas-api:${{ github.sha }}
          docker push ${{ secrets.AWS_ECR_URI }}/gsd-atlas-api:latest
          
          # Update ECS service with zero downtime
          aws ecs update-service --cluster gsd-atlas-production --service api --force-new-deployment

      - name: Deploy Web to S3
        run: |
          aws s3 sync apps/web/.next s3://${{ secrets.PRODUCTION_S3_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PRODUCTION_CLOUDFRONT_ID }} --paths "/*"

      - name: Run database migrations
        run: |
          cd packages/database
          npx prisma migrate deploy

      - name: Create database backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          aws rds create-db-snapshot \
            --db-instance-identifier gsd-atlas-production \
            --db-snapshot-identifier pre-deploy-${TIMESTAMP}

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -f https://api.gsdatlas.com/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check failed, retrying..."
            sleep 10
          done
          echo "Health check failed after 30 retries"
          exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deploy to Production completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rollback ECS service
        run: |
          aws ecs update-service --cluster gsd-atlas-production --service api --force-new-deployment

      - name: Rollback database
        run: |
          LATEST_SNAPSHOT=$(aws rds describe-db-snapshots \
            --db-instance-identifier gsd-atlas-production \
            --query 'sort_by(DBSnapshots, &SnapshotCreateTime)[-1].DBSnapshotIdentifier' \
            --output text)
          aws rds restore-db-instance-from-db-snapshot \
            --db-instance-identifier gsd-atlas-production-rollback \
            --db-snapshot-identifier $LATEST_SNAPSHOT

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: 'Rollback executed due to deployment failure'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
